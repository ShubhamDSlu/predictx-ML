<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictX - Smart ML Prediction System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="px-wrap">
    <div class="px-grid-bg"></div>
    <div class="px-glow"></div>
    <canvas id="neuralCanvas"></canvas>

    <div class="px-inner">
        <div class="px-badge">ML SYSTEM v2.0 - ACTIVE</div>
        <h1 class="px-title">Predict<span>X</span></h1>
        <p class="px-subtitle">// smart machine learning prediction system (capstone project)</p>

        <div class="px-card">
            <div class="px-section-label">input features</div>

            <form id="predictionForm" novalidate>
                <div class="px-grid">

                    <div class="px-field">
                        <label for="f1">f_01</label>
                        <input type="number" id="f1" placeholder="0.00" step="any" required>
                    </div>

                    <div class="px-field">
                        <label for="f2">f_02</label>
                        <input type="number" id="f2" placeholder="0.00" step="any" required>
                    </div>

                    <div class="px-field">
                        <label for="f3">f_03</label>
                        <input type="number" id="f3" placeholder="0.00" step="any" required>
                    </div>

                    <div class="px-field">
                        <label for="f4">f_04</label>
                        <input type="number" id="f4" placeholder="0.00" step="any" required>
                    </div>

                    <div class="px-field">
                        <label for="f5">f_05</label>
                        <input type="number" id="f5" placeholder="0.00" step="any" required>
                    </div>

                    <div class="px-field">
                        <label for="f6">f_06</label>
                        <input type="number" id="f6" placeholder="0.00" step="any" required>
                    </div>

                    <div class="px-field">
                        <label for="f7">f_07</label>
                        <input type="number" id="f7" placeholder="0.00" step="any" required>
                    </div>

                    <div class="px-field">
                        <label for="f8">f_08</label>
                        <input type="number" id="f8" placeholder="0.00" step="any" required>
                    </div>

                </div>

                <button type="submit" class="px-btn" id="predictBtn">Predict</button>
            </form>

            <p class="px-error" id="errorMsg"></p>

            <div class="px-result-area" id="resultArea">
                <div class="px-result-label">prediction output</div>
                <div class="px-result-value" id="resultValue">-</div>
                <div class="px-result-status" id="resultStatus"></div>
                <div class="px-result-bar">
                    <div class="px-result-bar-fill" id="resultBar"></div>
                </div>
            </div>
        </div>

        <div class="px-footer">developed by <span>Shubham</span> · machine learning capstone project</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var canvas = document.getElementById('neuralCanvas');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
var scene  = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

var layers = [
    [-3,   [0]],
    [-1.5, [-1.2, -0.4, 0.4, 1.2]],
    [0,    [-1.6, -0.8, 0, 0.8, 1.6]],
    [1.5,  [-1.2, -0.4, 0.4, 1.2]],
    [3,    [0]]
];

var group   = new THREE.Group();
var nodeMat = new THREE.MeshBasicMaterial({ color: 0x7c5cfc });
layers.forEach(function(layer) {
    var x = layer[0]; var ys = layer[1];
    ys.forEach(function(y) {
        var mesh = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), nodeMat.clone());
        mesh.position.set(x, y, 0);
        group.add(mesh);
    });
});

var edgeMat = new THREE.LineBasicMaterial({ color: 0x7c5cfc, transparent: true, opacity: 0.2 });
for (var l = 0; l < layers.length - 1; l++) {
    var x1 = layers[l][0]; var ys1 = layers[l][1];
    var x2 = layers[l+1][0]; var ys2 = layers[l+1][1];
    ys1.forEach(function(y1) {
        ys2.forEach(function(y2) {
            var geo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(x1, y1, 0),
                new THREE.Vector3(x2, y2, 0)
            ]);
            group.add(new THREE.Line(geo, edgeMat.clone()));
        });
    });
}

group.scale.set(0.55, 0.55, 0.55);
group.position.set(0, 1.8, 0);
scene.add(group);

var pulses = [];
var pulseTimer = 0;

function spawnPulse() {
    var fl = Math.floor(Math.random() * (layers.length - 1));
    var x1 = layers[fl][0]; var ys1 = layers[fl][1];
    var x2 = layers[fl+1][0]; var ys2 = layers[fl+1][1];
    var y1 = ys1[Math.floor(Math.random() * ys1.length)];
    var y2 = ys2[Math.floor(Math.random() * ys2.length)];
    var mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.07, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xc471ed })
    );
    mesh.position.set(x1, y1, 0);
    group.add(mesh);
    pulses.push({ mesh: mesh, start: new THREE.Vector3(x1, y1, 0), end: new THREE.Vector3(x2, y2, 0), t: 0, speed: 0.012 + Math.random() * 0.01 });
}

var mouseX = 0; var mouseY = 0;
document.addEventListener('mousemove', function(e) {
    mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});
window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
    requestAnimationFrame(animate);
    group.rotation.y += 0.004;
    group.rotation.x  = mouseY * 0.18;
    group.rotation.y += mouseX * 0.002;
    var t = Date.now() * 0.001;
    group.children.forEach(function(c, i) {
        if (c.geometry && c.geometry.parameters && c.geometry.parameters.radius === 0.12) {
            var s = 1 + 0.12 * Math.sin(t * 2 + i);
            c.scale.set(s, s, s);
        }
    });
    pulseTimer++;
    if (pulseTimer % 28 === 0) spawnPulse();
    for (var i = pulses.length - 1; i >= 0; i--) {
        var p = pulses[i];
        p.t += p.speed;
        if (p.t >= 1) { group.remove(p.mesh); pulses.splice(i, 1); }
        else p.mesh.position.lerpVectors(p.start, p.end, p.t);
    }
    renderer.render(scene, camera);
}
animate();

document.getElementById("predictionForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    var btn          = document.getElementById("predictBtn");
    var resultArea   = document.getElementById("resultArea");
    var resultValue  = document.getElementById("resultValue");
    var resultStatus = document.getElementById("resultStatus");
    var resultBar    = document.getElementById("resultBar");
    var errorMsg     = document.getElementById("errorMsg");

    var fields = ["f1","f2","f3","f4","f5","f6","f7","f8"];

    var data = {}; var hasEmpty = false;
    fields.forEach(function(id) {
        var val = document.getElementById(id).value.trim();
        if (val === "") hasEmpty = true;
        data[id] = val;
    });

    errorMsg.classList.remove("visible");
    if (hasEmpty) {
        errorMsg.textContent = "// all fields required before prediction";
        errorMsg.classList.add("visible");
        return;
    }

    btn.innerHTML = "<span class='spinner'></span>Running inference...";
    btn.classList.add("loading");
    resultArea.classList.remove("visible");
    resultBar.style.width = "0%";
    for (var i = 0; i < 8; i++) spawnPulse();

    try {
        var response = await fetch("/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });
        var result = await response.json();
        resultArea.classList.add("visible");

        if (result.prediction !== undefined) {
            resultValue.textContent                = result.prediction;
            resultValue.style.background           = "linear-gradient(135deg,#a89fff,#7c5cfc)";
            resultValue.style.webkitBackgroundClip = "text";
            resultValue.style.webkitTextFillColor  = "transparent";
            resultValue.style.backgroundClip       = "text";
            var conf = Math.round((result.confidence || 0.82) * 100);
            resultStatus.textContent   = "// inference complete · model confidence: " + conf + "%";
            resultBar.style.background = "linear-gradient(90deg,#7c5cfc,#c471ed)";
            setTimeout(function() { resultBar.style.width = conf + "%"; }, 100);
        } else {
            resultValue.textContent  = "ERROR";
            resultStatus.textContent = "// " + (result.error || "unknown error");
        }
    } catch(err) {
        resultArea.classList.add("visible");
        resultValue.textContent  = "ERR";
        resultStatus.textContent = "// server unreachable - is Flask running?";
    }

    btn.innerHTML = "Predict";
    btn.classList.remove("loading");
});
</script>

</body>
</html>
